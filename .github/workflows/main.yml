name: CI

on:
  push:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate dataset
        run: python data/generate_logs.py

      - name: Train model
        run: python src/train.py

      - name: Test model artifact exists
        run: |
          python -c "from pathlib import Path; assert Path('models/server_model.pkl').exists(), 'models/server_model.pkl not found'; print('Model artifact exists')"
